name: Build and Push Docker Image

# Requires GitHub Secrets: GHCR_USERNAME and GHCR_TOKEN
# To enable automatic builds on push, change workflow_dispatch to:
#   push:
#     branches: [main]

on:
  workflow_dispatch:  # Manual trigger only — no automatic builds

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (PAT)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ secrets.GHCR_USERNAME }}/hoyolab-auto:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
